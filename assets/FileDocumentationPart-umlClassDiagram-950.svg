@startuml
skinparam BackgroundColor transparent
hide empty methods
hide empty fields
interface "FileDocumentationPart<Type>" {
    +type : Type
}
interface "FileDocumentationPartText" {
    +content : string
    +isComment : boolean
    +type : TEXT
}
"FileDocumentationPart<Type>" <|- - "FileDocumentationPartText"
interface "FileDocumentationPartHeading" {
    +description : string
    +title : string
    +type : HEADING
}
"FileDocumentationPart<Type>" <|- - "FileDocumentationPartHeading"
interface "FileDocumentationPartValue" {
    +description : string
    +infos : string[]
    +isComment : boolean
    +lists : [string, string[]][]
    +prefix : string
    +properties : [string, string][]
    +title : string
    +type : VALUE
    +value : string
}
"FileDocumentationPart<Type>" <|- - "FileDocumentationPartValue"
interface "FileDocumentationPartNewline" {
    +count : number
    +type : NEWLINE
}
"FileDocumentationPart<Type>" <|- - "FileDocumentationPartNewline"
@enduml

